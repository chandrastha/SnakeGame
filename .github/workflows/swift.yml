name: Swift

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies -scheme SnakeGame

      - name: Build
        run: xcodebuild build -scheme SnakeGame -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail

          DEVICE_ID="$(
            xcrun simctl list devices available \
              | grep -m1 "iPhone 16" \
              | sed -E 's/.*\(([0-9A-F-]+)\).*/\1/'
          )"

          if [[ -z "${DEVICE_ID}" ]]; then
            echo "No available iPhone 16 simulator found on the runner."
            xcrun simctl list devices available
            exit 1
          fi

          xcrun simctl boot "${DEVICE_ID}" || true
          xcrun simctl bootstatus "${DEVICE_ID}" -b

          xcodebuild test \
            -scheme SnakeGame \
            -destination "platform=iOS Simulator,id=${DEVICE_ID}" \
            -only-testing:SnakeGameTests \
            CODE_SIGNING_ALLOWED=NO
