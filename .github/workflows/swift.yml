name: Swift

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies -scheme SnakeGame

      - name: Build
        run: xcodebuild build -scheme SnakeGame -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        run: |
          xcodebuild test \
            -scheme SnakeGame \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -destination-timeout 180 \
            -parallel-testing-enabled NO \
            -only-testing:SnakeGameTests \
            CODE_SIGNING_ALLOWED=NO
